[platformio]
default_envs = native

# The released package is the Core profile. Future profiles select additional
# separately manifested packages instead of changing this package's sources.
[microworld_core]
lib_deps = symlink://../..
lib_ldf_mode = chain+
build_flags =
    -std=gnu++17

[microworld_memory]
lib_deps =
    ${microworld_core.lib_deps}
    symlink://../../../microworld-memory
lib_ldf_mode = chain+
build_flags = ${microworld_core.build_flags}

[microworld_object]
lib_deps =
    ${microworld_memory.lib_deps}
    symlink://../../../microworld-object
lib_ldf_mode = chain+
build_flags = ${microworld_memory.build_flags}

[esp32_target]
partitions = ../../../../partitions.csv
flash_mode = qio
flash_frequency = 80000000L
flash_size = 16MB
maximum_size = 16777216
cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="../../../../sdkconfig.defaults"

[env:native]
platform = native
lib_deps = ${microworld_core.lib_deps}
lib_ldf_mode = ${microworld_core.lib_ldf_mode}
build_flags =
    ${microworld_core.build_flags}
    -fno-exceptions
    -fno-rtti
build_src_filter =
    +<NativeMain.cpp>
    -<Esp32Main.cpp>
    -<Esp32BenchmarkMain.cpp>
    -<MemoryNativeMain.cpp>
    -<MemoryEsp32Main.cpp>
    -<ObjectNativeMain.cpp>
    -<ObjectEsp32Main.cpp>

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
lib_deps = ${microworld_core.lib_deps}
lib_ldf_mode = ${microworld_core.lib_ldf_mode}
build_flags = ${microworld_core.build_flags}
board_build.partitions = ${esp32_target.partitions}
board_build.flash_mode = ${esp32_target.flash_mode}
board_build.f_flash = ${esp32_target.flash_frequency}
board_upload.flash_size = ${esp32_target.flash_size}
board_upload.maximum_size = ${esp32_target.maximum_size}
board_build.cmake_extra_args = ${esp32_target.cmake_extra_args}

[env:esp32-s3-memory]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
lib_deps = ${microworld_memory.lib_deps}
lib_ldf_mode = ${microworld_memory.lib_ldf_mode}
build_flags = ${microworld_memory.build_flags}
board_build.partitions = ${esp32_target.partitions}
board_build.flash_mode = ${esp32_target.flash_mode}
board_build.f_flash = ${esp32_target.flash_frequency}
board_upload.flash_size = ${esp32_target.flash_size}
board_upload.maximum_size = ${esp32_target.maximum_size}
board_build.cmake_extra_args = ${esp32_target.cmake_extra_args}

[env:esp32-s3-object]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
lib_deps = ${microworld_object.lib_deps}
lib_ldf_mode = ${microworld_object.lib_ldf_mode}
build_flags = ${microworld_object.build_flags}
board_build.partitions = ${esp32_target.partitions}
board_build.flash_mode = ${esp32_target.flash_mode}
board_build.f_flash = ${esp32_target.flash_frequency}
board_upload.flash_size = ${esp32_target.flash_size}
board_upload.maximum_size = ${esp32_target.maximum_size}
board_build.cmake_extra_args = ${esp32_target.cmake_extra_args}

[env:esp32-s3-benchmark]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
lib_deps = ${microworld_core.lib_deps}
lib_ldf_mode = ${microworld_core.lib_ldf_mode}
monitor_speed = 115200
build_type = release
build_flags =
    ${microworld_core.build_flags}
    -Os
board_build.partitions = ${esp32_target.partitions}
board_build.flash_mode = ${esp32_target.flash_mode}
board_build.f_flash = ${esp32_target.flash_frequency}
board_upload.flash_size = ${esp32_target.flash_size}
board_upload.maximum_size = ${esp32_target.maximum_size}
board_build.cmake_extra_args = ${esp32_target.cmake_extra_args}
