[platformio]
default_envs = native

[common]
lib_deps = symlink://../..
lib_ldf_mode = chain+
build_flags =
    -std=gnu++17

[esp32_target]
partitions = ../../../../partitions.csv
flash_mode = qio
flash_frequency = 80000000L
flash_size = 16MB
maximum_size = 16777216
cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="../../../../sdkconfig.defaults"

[env:native]
platform = native
lib_deps = ${common.lib_deps}
lib_ldf_mode = ${common.lib_ldf_mode}
build_flags =
    ${common.build_flags}
    -fno-exceptions
    -fno-rtti
build_src_filter =
    +<NativeMain.cpp>
    -<Esp32Main.cpp>
    -<Esp32BenchmarkMain.cpp>

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
lib_deps = ${common.lib_deps}
lib_ldf_mode = ${common.lib_ldf_mode}
build_flags = ${common.build_flags}
board_build.partitions = ${esp32_target.partitions}
board_build.flash_mode = ${esp32_target.flash_mode}
board_build.f_flash = ${esp32_target.flash_frequency}
board_upload.flash_size = ${esp32_target.flash_size}
board_upload.maximum_size = ${esp32_target.maximum_size}
board_build.cmake_extra_args = ${esp32_target.cmake_extra_args}

[env:esp32-s3-benchmark]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
lib_deps = ${common.lib_deps}
lib_ldf_mode = ${common.lib_ldf_mode}
monitor_speed = 115200
build_type = release
build_flags =
    ${common.build_flags}
    -Os
board_build.partitions = ${esp32_target.partitions}
board_build.flash_mode = ${esp32_target.flash_mode}
board_build.f_flash = ${esp32_target.flash_frequency}
board_upload.flash_size = ${esp32_target.flash_size}
board_upload.maximum_size = ${esp32_target.maximum_size}
board_build.cmake_extra_args = ${esp32_target.cmake_extra_args}
