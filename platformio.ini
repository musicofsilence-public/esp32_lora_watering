; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
; Why: The module has 16 MB of flash, so the default 1 MB application layout
; would leave most of the available flash unusable.
board_build.partitions = partitions.csv
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
monitor_speed = 115200
; MicroWorld is developed in the sibling repo; symlink:// consumes it in place so
; engine changes are picked up without re-installing. Declared explicitly because
; the LDF only auto-links libraries the sources already include. chain+ matches
; the engine's own consumer harness (evaluates preprocessor conditionals).
lib_deps =
    symlink://../MicroWorld/Modules/Core
    symlink://../MicroWorld/Modules/Memory
    symlink://../MicroWorld/Modules/Object
    symlink://../MicroWorld/Modules/Engine
    symlink://../MicroWorld/Modules/Net
    symlink://../MicroWorld/Modules/PlatformEsp32
lib_ldf_mode = chain+
